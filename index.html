<!DOCTYPE html>
<html>
<head>
    <title>Мой простой лендинг</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        main {
            width: 80%;
            margin: auto;
            padding: 20px;
        }
        main h2 {
            color: #333;
        }
        main p {
            color: #666;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Сайт</h1>
    </header>
    <div align="center">
    <section class="feedback">
<form class="feedback-form">
<h2 class="feedback-form__title">Связаться с нами</h2>
<div class="feedback-form__group"><input class="feedback-form__input" type="text" id="name" name="name" required placeholder="Имя">
<input class="feedback-form__input" type="email" id="email" name="email" required placeholder="E-mail">
<textarea class="feedback-forminput feedback-formtextarea" id="message" name="message" required placeholder="Введите сообщение"></textarea>
<input class="feedback-form__submit" type="submit" value="ОТПРАВИТЬ">
</div>
</form>
</section>
        </div>
<div align='center'>
<button onclick="location.href='https://soulbot.ru'" class="button">Перейти на сайт</button>

<style>
.button {
    color: white;
    background-color: #007BFF;
    border: none;
    padding: 10px 20px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: background-color 0.3s;
}
.button:hover {
    background-color: #0056b3;
}
</style>
</div>
    <main>
        <h2>О нас</h2>
        <p>Здесь вы можете узнать много интересного о нашей организации.</p>

        <h2>Наши услуги</h2>
        <p>Мы предлагаем широкий спектр услуг, которые помогут вам в реализации ваших планов.</p>

        <h2>Контакты</h2>
        <p>Свяжитесь с нами, и мы обязательно ответим на все ваши вопросы.</p>
    </main>

    <footer>
        <p>2023 &copy; Все права защищены</p>
    </footer>
</body>
</html>
